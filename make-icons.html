<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>G検定 アイコン生成</title></head>
<body style="font-family:sans-serif;padding:20px;background:#f0f4f8;">
<h2>G検定アイコン生成</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:8px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:8px;width:128px;height:128px;"></canvas>
<br>
<button onclick="download('c192','icon-192.png')" style="margin:6px;padding:8px 16px;background:#2563eb;color:white;border:none;cursor:pointer;font-size:0.9rem;">icon-192.png をダウンロード</button>
<button onclick="download('c512','icon-512.png')" style="margin:6px;padding:8px 16px;background:#2563eb;color:white;border:none;cursor:pointer;font-size:0.9rem;">icon-512.png をダウンロード</button>
<script>
function draw(id) {
  const c = document.getElementById(id);
  const s = c.width;
  const ctx = c.getContext('2d');
  // 背景グラデーション
  const grad = ctx.createLinearGradient(0,0,s,s);
  grad.addColorStop(0,'#0f1724');
  grad.addColorStop(1,'#1e3a5f');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,s,s);
  // 丸みを持たせる（角丸矩形）
  const r = s * 0.18;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(s-r,0); ctx.quadraticCurveTo(s,0,s,r);
  ctx.lineTo(s,s-r); ctx.quadraticCurveTo(s,s,s-r,s);
  ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,s,s);

  // 装飾：回路基板風ライン
  ctx.strokeStyle = 'rgba(56,189,248,0.15)';
  ctx.lineWidth = s*0.012;
  for(let i=1;i<4;i++){
    ctx.beginPath(); ctx.moveTo(s*0.05,s*i*0.25); ctx.lineTo(s*0.95,s*i*0.25); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*i*0.25,s*0.05); ctx.lineTo(s*i*0.25,s*0.95); ctx.stroke();
  }

  // 「G」メイン文字
  ctx.fillStyle = '#38bdf8';
  ctx.font = `bold ${s*0.46}px 'Arial','Helvetica',sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(56,189,248,0.6)';
  ctx.shadowBlur = s*0.08;
  ctx.fillText('G', s*0.5, s*0.42);

  // 「検定」サブテキスト
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `bold ${s*0.12}px 'Arial','Helvetica',sans-serif`;
  ctx.fillText('検定', s*0.5, s*0.75);

  // ドット装飾
  ctx.fillStyle = 'rgba(56,189,248,0.5)';
  const dots = [[0.12,0.12],[0.88,0.12],[0.12,0.88],[0.88,0.88]];
  dots.forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x*s,y*s,s*0.03,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}
function download(id,name){
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}
draw('c192'); draw('c512');
</script>
</body>
</html>
